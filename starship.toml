format = """
[в–‘в–’в–“](#a3aed2)\
$os(bg:#a3aed2 fg:#090c0c)\
[оӮ°](fg:#a3aed2 bg:#769ff0)\
$directory\
[оӮ°](fg:#769ff0 bg:#394260)\
[ пӢІ ](fg:#e3e5e5 bg:#394260)$cmd_duration\
[оӮ°](fg:#394260 bg:#1d2230)\
$git_branch\
$git_status\
[оӮ°](fg:#1d2230)\
$fill\
[оӮІ](fg:#1d2230)\
$status\
[оӮІ](fg:#394260 bg:#1d2230)\
$battery\
[оӮІ](fg:#769ff0 bg:#394260)\
$memory_usage\
[оӮІ](fg:#a3aed2 bg:#769ff0)\
$time\
[в–“в–’в–‘](#a3aed2)\
\n$character"""

[os]
disabled = false
format = '[ $symbol](bg:#a3aed2 fg:#090c0c)'

[directory]
format = "[ $path](fg:#e3e5e5 bg:#769ff0)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[cmd_duration]
min_time = 1
format = '[$duration](fg:#e3e5e5 bg:#394260)'

[git_branch]
format = '[[ $symbol$branch](fg:#e3e5e5 bg:#1d2230)](fgi:#1d2230)'

[git_status]
format = '[[($all_status$ahead_behind)](fg:#e3e5e5 bg:#1d2230)](fg:#1d2230)'

[fill]
symbol = ' '

[status]
symbol = 'у°…ҷ'
success_symbol = 'пҒҳ'
not_executable_symbol = 'пҒӘ'
not_found_symbol = 'пҒҷ'
sigint_symbol = 'пӢө'
format = '[$symbol ](fg:#a3aed2 bg:#1d2230)'
map_symbol = true
disabled = false

[battery]
disabled = false
full_symbol	= 'у°Ғ№'
charging_symbol	= 'уұҹ '
discharging_symbol = 'уұҹһ'
unknown_symbol	= 'у°ҒҪ'
empty_symbol = 'уұғҚ'
format = '[$symbol$percentage](bg:#394260)'

[[battery.display]]
threshold = 100

[memory_usage]
disabled = false
threshold = -1
format = '[оҝ… $ram_pct](fg:#e3e5e5 bg:#769ff0)'

[time]
disabled = false
time_format = '%R'
format = '[[пҗә $time](fg:#090c0c bg:#a3aed2)](bg:#1d2230)'

[character]
success_symbol = '[п„  ](bold green)'
error_symbol = '[п„  ](bold red)'
