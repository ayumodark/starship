format = """
[вЦСвЦТвЦУ](#a3aed2)\
[ пТЙ ](bg:#a3aed2 fg:#090c0c)\
[оВі](fg:#a3aed2 bg:#769ff0)\
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260)\
$fill\
[оВґ](fg:#394260)\
$battery\
[оВґ](fg:#769ff0 bg:#394260)\
$memory_usage\
[оВґ](fg:#a3aed2 bg:#769ff0)\
$time\
[вЦУвЦТвЦС](#a3aed2)\
\n$character"""

[fill]
symbol = ' '

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[battery]
disabled = false
format = '[$symbol$percentage]($style)'

[memory_usage]
disabled = false
threshold = -1
format = '[оњЕ $ram_pct ]($style)'
style = "fg:#e3e5e5 bg:#769ff0"


[time]
disabled = false
time_format = '%R'
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#090c0c bg:#a3aed2)]($style)'

