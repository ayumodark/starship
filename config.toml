format = """
[вЦСвЦТвЦУ](#a3aed2)\
[ пТЙ ](bg:#a3aed2 fg:#090c0c)\
[оВі](bg:#769ff0)\
$directory\
[оВі](fg:#769ff0)\
$git_branch\
$git_status\
[оВі](fg:#394260)\
$fill\
[оВґ](fg:#1d2230)\
$battery\
$time\
[оВі ](fg:#1d2230)\
\n$character"""

[fill]
symbol = ' '

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[battery]
disabled = false
format = '[$symbol$percentage]($style)'

[time]
disabled = false
time_format = '%R'
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
