format = """
[в–‘в–’в–“](#a3aed2)\
[ п’ү ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](fg:#a3aed2 bg:#769ff0)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260)\
$fill\
[оӮ¶](fg:#1d2230)\
$status\
$cmd_duration\
[оӮ¶](fg:#394260 bg:#1d2230)\
$battery\
[оӮ¶](fg:#769ff0 bg:#394260)\
$memory_usage\
[оӮ¶](fg:#a3aed2 bg:#769ff0)\
$time\
[в–“в–’в–‘](#a3aed2)\
\n$character"""

[fill]
symbol = ' '

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[cmd_duration]
min_time = 500
format = '[$duration ](fg:#769ff0 bg:#1d2230)'

[status]
style = 'fg:#a3aed2 bg:#1d2230'
symbol = 'у°…ҷ  '
success_symbol = 'пҒҳ  ' 
format = '[$symbol]($style)'
map_symbol = true
disabled = false

[battery]
disabled = false
full_symbol	= 'у°Ғ№'
charging_symbol	= 'уұҹ '
discharging_symbol = 'уұҹһ'
unknown_symbol	= 'у°ҒҪ'
empty_symbol = 'уұғҚ'
format = '[$symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = "bg:#394260"

[memory_usage]
disabled = false
threshold = -1
format = '[оҝ… $ram_pct ]($style)'
style = "fg:#e3e5e5 bg:#769ff0"


[time]
disabled = false
time_format = '%R'
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#090c0c bg:#a3aed2)]($style)'

